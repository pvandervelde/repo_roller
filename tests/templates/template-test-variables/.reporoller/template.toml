default_visibility = "public"

[template]
name = "template-test-variables"
description = "Template with variable substitution for testing"
author = "RepoRoller Test Suite"
tags = ["test", "variables"]

[variables.project_name]
description = "Name of the project"
required = true

[variables.version]
description = "Initial version"
required = true
default = "0.1.0"

[variables.author_name]
description = "Author full name"
required = true

[variables.author_email]
description = "Author email address"
required = true

[variables.project_description]
description = "Short description of the project"
required = true

[variables.license]
description = "SPDX license identifier (e.g. MIT, Apache-2.0)"
required = true
default = "MIT"

[variables.environment]
description = "Target environment (e.g. development, production)"
required = true
default = "development"
