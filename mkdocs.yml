      - System overview: explanation/system-overview.md
      - Core concepts: explanation/core-concepts.md
      - Authentication and authorization: explanation/authentication-and-authorization.md
      - Configuration hierarchy: explanation/configuration-hierarchy.md
      - Metadata repository: explanation/metadata-repository.md
      - Permissions model: explanation/permissions-model.md
      - Repository visibility: explanation/repository-visibility.md
      - Template processing: explanation/template-processing.md
  - Reference:
