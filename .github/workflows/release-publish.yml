name: Release Publish

on:
  pull_request:
    types: [ closed ]
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    name: Publish release artifacts
    # Only run if PR was merged and has release label
    if: github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - name: Extract version from Cargo.toml
        id: extract_version
        run: |
          VERSION=$(grep "^version = " Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/')
          echo "Extracted version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          # Determine if this is a prerelease (0.x.x or contains -alpha, -beta, -rc)
          if [[ "${VERSION}" =~ ^0\. ]] || [[ "${VERSION}" =~ -(alpha|beta|rc) ]]; then
            echo "This is a prerelease version"
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "This is a stable release"
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate release notes
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v${VERSION}"

          # Generate changelog for commits since the last tag.
          # --strip all removes the cliff header/footer so the output is just
          # the version body (commit groups).
          git-cliff --tag "${TAG}" --unreleased --strip all > release_notes.md

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v${VERSION}"

          if [ "${{ steps.extract_version.outputs.IS_PRERELEASE }}" = "true" ]; then
            gh release create "${TAG}" \
              --title "Release ${TAG}" \
              --notes-file release_notes.md \
              --prerelease
          else
            gh release create "${TAG}" \
              --title "Release ${TAG}" \
              --notes-file release_notes.md
          fi

          echo "Created release ${TAG}"
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API container image
        id: build_container
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v${VERSION}"
          IS_PRERELEASE="${{ steps.extract_version.outputs.IS_PRERELEASE }}"

          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/repo_roller_api"

          echo "Building container image ${IMAGE_NAME}:${TAG}"

          # Build and push with version tag
          docker buildx build \
            --platform linux/amd64 \
            --file crates/repo_roller_api/Dockerfile \
            --tag "${IMAGE_NAME}:${TAG}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --push \
            .

          echo "Pushed ${IMAGE_NAME}:${TAG}"

          # Also tag as latest if this is a stable release.
          # Use imagetools create to re-tag the existing manifest rather than
          # rebuilding so that OCI labels are preserved.
          if [ "${IS_PRERELEASE}" = "false" ]; then
            echo "Tagging as latest"
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:latest" \
              "${IMAGE_NAME}:${TAG}"
            echo "Pushed ${IMAGE_NAME}:latest"
          fi

          echo "API container image published successfully"

      - name: Build and push frontend container image
        id: build_frontend_container
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          TAG="v${VERSION}"
          IS_PRERELEASE="${{ steps.extract_version.outputs.IS_PRERELEASE }}"

          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/repo_roller_frontend"

          echo "Building container image ${IMAGE_NAME}:${TAG}"

          # Build and push with version tag
          docker buildx build \
            --platform linux/amd64 \
            --file frontend/Dockerfile \
            --tag "${IMAGE_NAME}:${TAG}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --push \
            frontend/

          echo "Pushed ${IMAGE_NAME}:${TAG}"

          # Also tag as latest if this is a stable release.
          # Use imagetools create to re-tag the existing manifest rather than
          # rebuilding so that OCI labels are preserved.
          if [ "${IS_PRERELEASE}" = "false" ]; then
            echo "Tagging as latest"
            docker buildx imagetools create \
              --tag "${IMAGE_NAME}:latest" \
              "${IMAGE_NAME}:${TAG}"
            echo "Pushed ${IMAGE_NAME}:latest"
          fi

          echo "Frontend container image published successfully"

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends mingw-w64

      - name: Build CLI binaries
        id: build_binaries
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"

          # Build for Linux
          echo "Building for Linux (x86_64-unknown-linux-gnu)"
          cargo build --release --package repo_roller_cli --target x86_64-unknown-linux-gnu || echo "Linux build failed"

          # Build for Windows
          echo "Building for Windows (x86_64-pc-windows-gnu)"
          rustup target add x86_64-pc-windows-gnu
          cargo build --release --package repo_roller_cli --target x86_64-pc-windows-gnu || echo "Windows build failed"

          # macOS requires macOS runner, skip for now
          echo "macOS build requires macOS runner (skipped)"

          # Check which builds succeeded
          if [ -f "target/x86_64-unknown-linux-gnu/release/repo_roller_cli" ]; then
            echo "linux_built=true" >> $GITHUB_OUTPUT
          else
            echo "linux_built=false" >> $GITHUB_OUTPUT
          fi

          if [ -f "target/x86_64-pc-windows-gnu/release/repo_roller_cli.exe" ]; then
            echo "windows_built=true" >> $GITHUB_OUTPUT
          else
            echo "windows_built=false" >> $GITHUB_OUTPUT
          fi

      - name: Package Linux binary
        if: steps.build_binaries.outputs.linux_built == 'true'
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          ARCHIVE_NAME="repo-roller-v${VERSION}-x86_64-linux.tar.gz"

          # Create archive
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/repo_roller_cli dist/repo-roller
          cp README.md LICENSE dist/

          cd dist
          tar czf "../${ARCHIVE_NAME}" repo-roller README.md LICENSE
          cd ..

          # Generate checksum
          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

          echo "Created ${ARCHIVE_NAME}"

      - name: Package Windows binary
        if: steps.build_binaries.outputs.windows_built == 'true'
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          ARCHIVE_NAME="repo-roller-v${VERSION}-x86_64-windows.zip"

          # Create archive
          mkdir -p dist-windows
          cp target/x86_64-pc-windows-gnu/release/repo_roller_cli.exe dist-windows/repo-roller.exe
          cp README.md LICENSE dist-windows/

          cd dist-windows
          zip -r "../${ARCHIVE_NAME}" repo-roller.exe README.md LICENSE
          cd ..

          # Generate checksum
          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

          echo "Created ${ARCHIVE_NAME}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.create_release.outputs.TAG }}"

          # Upload Linux binary if available
          if [ -f repo-roller-v*.tar.gz ]; then
            for file in repo-roller-v*.tar.gz*; do
              echo "Uploading ${file}"
              gh release upload "${TAG}" "${file}" --clobber
            done
          fi

          # Upload Windows binary if available
          if [ -f repo-roller-v*.zip ]; then
            for file in repo-roller-v*.zip*; do
              echo "Uploading ${file}"
              gh release upload "${TAG}" "${file}" --clobber
            done
          fi

          echo "Release assets uploaded"

      - name: Append installation instructions to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.create_release.outputs.TAG }}"
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          API_IMAGE="ghcr.io/${{ github.repository_owner }}/repo_roller_api"
          FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/repo_roller_frontend"

          # Append installation section to the git-cliff generated notes.
          # printf is used instead of heredocs to keep all lines at the correct
          # YAML indentation level (heredoc terminators at column 0 break YAML).
          {
            printf '\n---\n\n## Installation\n\n### Container Images\n\n'
            printf '**API:** `docker pull %s:%s`\n\n' "${API_IMAGE}" "${TAG}"
            printf '**Frontend:** `docker pull %s:%s`\n\n' "${FRONTEND_IMAGE}" "${TAG}"
          } >> release_notes.md

          if [ -f "repo-roller-v${VERSION}-x86_64-linux.tar.gz" ]; then
            {
              printf '### CLI \xe2\x80\x94 Linux (x86_64)\n'
              printf '```bash\n'
              printf 'curl -L https://github.com/${{ github.repository }}/releases/download/%s/repo-roller-v%s-x86_64-linux.tar.gz | tar xz\n' "${TAG}" "${VERSION}"
              printf 'sudo mv repo-roller /usr/local/bin/\n'
              printf '```\n\n'
            } >> release_notes.md
          fi

          if [ -f "repo-roller-v${VERSION}-x86_64-windows.zip" ]; then
            {
              printf '### CLI \xe2\x80\x94 Windows (x86_64)\n'
              printf '```powershell\n'
              printf 'Invoke-WebRequest -Uri https://github.com/${{ github.repository }}/releases/download/%s/repo-roller-v%s-x86_64-windows.zip -OutFile repo-roller.zip\n' "${TAG}" "${VERSION}"
              printf 'Expand-Archive repo-roller.zip\n'
              printf 'Move-Item repo-roller\\repo-roller.exe $env:SystemRoot\\System32\\\n'
              printf '```\n\n'
            } >> release_notes.md
          fi

          {
            printf '### Verify\n'
            printf '```bash\n'
            printf 'repo-roller --version\n'
            printf '```\n'
            printf '> Checksums: download the `.sha256` files alongside each binary to verify integrity.\n'
          } >> release_notes.md

          gh release edit "${TAG}" --notes-file release_notes.md

      - name: Handle container build failure
        if: failure() && (steps.build_container.conclusion == 'failure' ||
          steps.build_frontend_container.conclusion == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.create_release.outputs.TAG }}"

          echo "Container build failed - rolling back release"
          gh release delete "${TAG}" --yes || true
          git push origin --delete "${TAG}" || true
          exit 1

      - name: Report binary build failures
        if: steps.build_binaries.outputs.linux_built == 'false' ||
          steps.build_binaries.outputs.windows_built == 'false'
        run: |
          FAILED=""
          if [ "${{ steps.build_binaries.outputs.linux_built }}" = "false" ]; then
            FAILED="${FAILED}  - Linux (x86_64-unknown-linux-gnu)\n"
          fi
          if [ "${{ steps.build_binaries.outputs.windows_built }}" = "false" ]; then
            FAILED="${FAILED}  - Windows (x86_64-pc-windows-gnu)\n"
          fi
          printf "::warning::Some binary builds failed for release ${{ steps.create_release.outputs.TAG }}:\n%s" "${FAILED}"
          exit 1
