name: Release

# Triggered by release-regent when it publishes a GitHub Release after a
# release/* PR is merged.  This workflow builds CLI binaries for the
# supported platforms and a Docker image for the API server, then uploads
# them as assets on the release.

on:
    release:
        types: [published]

permissions:
    contents: write # upload release assets
    packages: write # push to GHCR
    id-token: write # sign attestations via Sigstore/Fulcio
    attestations: write # store attestations in GitHub

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # CLI binaries
    # ─────────────────────────────────────────────────────────────────────────
    build-cli:
        name: Build CLI — ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      archive_ext: tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      archive_ext: tar.gz
                    - target: x86_64-apple-darwin
                      # NOTE: macos-latest is an ARM (M1/M2) runner. Building x86_64-apple-darwin
                      # is cross-compilation via the macOS Universal SDK — verify with a dry-run
                      # on the next release if this target has not been previously tested.
                      os: macos-latest
                      archive_ext: tar.gz
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      archive_ext: tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      archive_ext: zip

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (aarch64-linux)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
              with:
                  key: ${{ matrix.target }}

            - name: Build CLI binary
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
              run: |
                  cargo build --release --package repo_roller_cli --target ${{ matrix.target }}

            - name: Set asset paths
              shell: bash
              run: |
                  VERSION="${{ github.event.release.tag_name }}"
                  BASE="repo_roller_cli-${VERSION}-${{ matrix.target }}"
                  if [ "${{ matrix.archive_ext }}" = "zip" ]; then
                      echo "BINARY_PATH=target/${{ matrix.target }}/release/repo_roller_cli.exe" >> $GITHUB_ENV
                      echo "ASSET_PATH=${BASE}.zip" >> $GITHUB_ENV
                  else
                      echo "BINARY_PATH=target/${{ matrix.target }}/release/repo_roller_cli" >> $GITHUB_ENV
                      echo "ASSET_PATH=${BASE}.tar.gz" >> $GITHUB_ENV
                  fi
                  echo "SBOM_PATH=${BASE}.sbom.spdx.json" >> $GITHUB_ENV

            - name: Generate SBOM for CLI binary
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  file: ${{ env.BINARY_PATH }}
                  output-file: ${{ env.SBOM_PATH }}
                  format: spdx-json
                  upload-artifact: false
                  upload-release-assets: false

            - name: Package binary (Unix)
              if: matrix.archive_ext == 'tar.gz'
              run: |
                  cp "${{ env.BINARY_PATH }}" repo_roller_cli
                  tar -czf "${{ env.ASSET_PATH }}" repo_roller_cli

            - name: Package binary (Windows)
              if: matrix.archive_ext == 'zip'
              shell: pwsh
              run: |
                  Copy-Item "$env:BINARY_PATH" "repo_roller_cli.exe"
                  Compress-Archive -Path "repo_roller_cli.exe" -DestinationPath "$env:ASSET_PATH"

            - name: Generate checksum (Unix)
              if: matrix.archive_ext == 'tar.gz'
              run: sha256sum "${{ env.ASSET_PATH }}" > "${{ env.ASSET_PATH }}.sha256"

            - name: Generate checksum (Windows)
              if: matrix.archive_ext == 'zip'
              shell: pwsh
              run: |
                  $hash = (Get-FileHash -Algorithm SHA256 "$env:ASSET_PATH").Hash.ToLower()
                  $filename = Split-Path -Leaf "$env:ASSET_PATH"
                  "$hash  $filename" | Set-Content "$env:ASSET_PATH.sha256"

            - name: Upload CLI binary, checksum, and SBOM to release
              uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2
              with:
                  files: |
                      ${{ env.ASSET_PATH }}
                      ${{ env.ASSET_PATH }}.sha256
                      ${{ env.SBOM_PATH }}

            - name: Attest build provenance for CLI binary
              uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
              with:
                  subject-path: ${{ env.ASSET_PATH }}

            - name: Attest SBOM for CLI binary
              uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
              with:
                  subject-path: ${{ env.ASSET_PATH }}
                  predicate-type: https://spdx.dev/Document
                  predicate: ${{ env.SBOM_PATH }}

    # ─────────────────────────────────────────────────────────────────────────
    # API Docker image
    # ─────────────────────────────────────────────────────────────────────────
    build-api-image:
        name: Build API Docker image
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@902fa8ec7d6ecbea8a986b5e040ecfe2aa9c17e1 # v5
              with:
                  images: ghcr.io/${{ github.repository }}/api
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest

            - name: Build and push API image
              id: build
              uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
              with:
                  context: .
                  file: crates/repo_roller_api/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  provenance: mode=max
                  sbom: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Attest API image provenance
              uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
              with:
                  subject-name: ghcr.io/${{ github.repository }}/api
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true

    # ─────────────────────────────────────────────────────────────────────────
    # Frontend Docker image
    # ─────────────────────────────────────────────────────────────────────────
    build-frontend-image:
        name: Build frontend Docker image
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@902fa8ec7d6ecbea8a986b5e040ecfe2aa9c17e1 # v5
              with:
                  images: ghcr.io/${{ github.repository }}/frontend
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest

            - name: Build and push frontend image
              id: build
              uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
              with:
                  context: frontend
                  file: frontend/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  provenance: mode=max
                  sbom: true
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Attest frontend image provenance
              uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
              with:
                  subject-name: ghcr.io/${{ github.repository }}/frontend
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true
